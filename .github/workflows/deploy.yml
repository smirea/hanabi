name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deployment disabled
        run: |
          echo "Deploy is disabled because Hanabi now requires the Bun API server and SQLite storage."
          echo "Configure server hosting, persistent DATABASE_URL storage, and API/SSE routing before re-enabling production deploy."
          exit 1
